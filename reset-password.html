<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Nevo Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="../config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --espresso:#2B1B14; --parchment:#E8DCC4; --parchment-2:#F1E9D8;
    --gold:#C08A3E; --sage:#4B5D46; --cream:#F5EFE3; --line:rgba(43,27,20,0.14); --red:#B3432B;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Sora', sans-serif; background:var(--parchment); color:var(--espresso); min-height:100vh;}
  h1,h2{font-family:'Fraunces', serif;}
  .wrap{ max-width:360px; margin:70px auto; padding:0 20px; }
  h2{ font-size:22px; margin-bottom:6px; }
  p{ font-size:12.5px; color:#6b5d4f; margin-bottom:20px; line-height:1.5; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--sage); margin-bottom:6px; }
  .field input{ width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; background:var(--parchment-2); font-size:13.5px; font-family:inherit; }
  .btn-primary{
    width:100%; background:var(--espresso); color:var(--cream); border:none; border-radius:100px;
    padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Sora',sans-serif;
  }
  .msg{ font-size:12px; margin-top:12px; }
  .msg.error{ color:var(--red); }
  .msg.success{ color:var(--sage); }
  a{ color:#9C6E2E; }
</style>
</head>
<body>
  <div class="wrap">
    <h2>Set a new password</h2>
    <p id="introText">Enter a new password for your Nevo staff account below.</p>

    <div id="formArea">
      <div class="field"><label>New password</label><input id="newPassword" type="password" placeholder="At least 8 characters"></div>
      <div class="field"><label>Confirm password</label><input id="confirmPassword" type="password" placeholder="Repeat password"></div>
      <button class="btn-primary" id="submitBtn" onclick="updatePassword()">Save new password</button>
    </div>
    <div class="msg" id="msg"></div>
    <p style="margin-top:20px;"><a href="dashboard.html">← Back to sign in</a></p>
  </div>

<script>
const CFG = window.NEVO_CONFIG || {};
const SUPABASE_READY = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY);
const sb = SUPABASE_READY ? supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;

function showMsg(text, kind){
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + kind;
}

if(!SUPABASE_READY){
  showMsg("Supabase isn't configured yet — this page can't work until config.js has real credentials.", "error");
  document.getElementById("formArea").style.display = "none";
}

async function updatePassword(){
  const p1 = document.getElementById("newPassword").value;
  const p2 = document.getElementById("confirmPassword").value;

  if(p1.length < 8){ showMsg("Password must be at least 8 characters.", "error"); return; }
  if(p1 !== p2){ showMsg("Passwords don't match.", "error"); return; }

  const { error } = await sb.auth.updateUser({ password: p1 });
  if(error){
    showMsg("Could not update password: " + error.message, "error");
    return;
  }
  showMsg("Password updated! Redirecting to sign in…", "success");
  document.getElementById("formArea").style.display = "none";
  setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
}

// Supabase automatically reads the recovery token from the URL and creates
// a temporary session when this page loads via the emailed reset link.
// If someone lands here without that token (e.g. typed the URL directly),
// there's no valid session to update — catch that case clearly.
(async function checkSession(){
  if(!SUPABASE_READY) return;
  const { data } = await sb.auth.getSession();
  if(!data.session){
    document.getElementById("introText").textContent =
      "This page only works when opened from the password reset link in your email.";
    document.getElementById("formArea").style.display = "none";
  }
})();
</script>
</body>
</html>
